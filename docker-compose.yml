version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - ENVIRONMENT=development
      - DEBUG=True
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
